<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T Sports Live</title>
    <!-- HLS.js Library for universal .m3u8 playback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling & Theme Variables */
        :root {
            --bg-main: #0a0b0e;
            --bg-card: #12141c;
            --accent: #e50914; /* Dynamic Sports Red */
            --text-main: #ffffff;
            --text-muted: #707584;
            --glow: rgba(229, 9, 20, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header Navigation */
        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #1f222e;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        /* Streaming Player Container */
        .player-container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* Channel Details Block */
        .channel-info {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .channel-meta h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .channel-meta p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Status Badges */
        .status-badges {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge-live {
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 0 12px var(--glow);
        }

        .badge-live::before {
            content: '';
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.2s infinite;
        }

        .badge-category {
            background: #1f222e;
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Keyframe Animations */
        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .channel-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">Satu<span>Pro</span></div>
        <div class="badge-category" style="color: #fff; background: var(--accent);">Premium IPTV</div>
    </header>

    <!-- Main Player Structure -->
    <div class="player-container">
        <div class="video-wrapper">
            <video id="video" controls autoplay playsinline preload="auto"></video>
        </div>
        
        <div class="channel-info">
            <div class="channel-meta">
                <h1>T Sports Live</h1>
                <p>Enjoy live sports, cricket matches, and localized broadcasting instantly.</p>
            </div>
            <div class="status-badges">
                <span class="badge-live">Live</span>
                <span class="badge-category">Sports</span>
            </div>
        </div>
    </div>

    <!-- HLS Stream Engine Integration -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('video');
            // Your exact live M3U8 source link
            const streamUrl = 'https://trs1.aynaott.com/tsports/index.m3u8';

            if (Hls.isSupported()) {
                const hls = new Hls({
                    maxSubtitleBufferSize: 20 * 1024 * 1024,
                    lowLatencyMode: true,
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {
                        console.log("Autoplay blocked by browser. Awaiting user interaction.");
                    });
                });
            } 
            // Fallback for native HLS players (Safari / iOS browsers)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => {
                        console.log("Autoplay blocked natively.");
                    });
                });
            }
        });
    </script>

</body>
</html>

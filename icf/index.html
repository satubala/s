<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icf - IPTV Player</title>
    <!-- Tailwind CSS for Beautiful Minimal Design -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- HLS.js for M3U8 Streaming Support -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* Custom scrollbar for channel list */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #111827;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #374151;
            border-radius: 3px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header / Navbar -->
    <header class="bg-[#111827] border-b border-gray-800 px-6 py-4 flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <span class="text-2xl font-black tracking-wider text-red-500 uppercase">icf</span>
            <span class="text-xs text-gray-500 border border-gray-700 px-2 py-0.5 rounded-md">satu.pro.bd</span>
        </div>
        <div class="flex items-center space-x-4">
            <span id="current-channel-title" class="text-sm font-medium text-gray-300 truncate max-w-[180px] sm:max-w-xs">লোডিং...</span>
            <!-- Channel List Toggle Button (অনলাইন চ্যানেল হাইড রাখার জন্য) -->
            <button id="toggle-list-btn" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg text-sm transition flex items-center space-x-2">
                <i class="fa-solid fa-tv"></i>
                <span>চ্যানেল লিস্ট</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="flex-1 flex relative overflow-hidden">
        
        <!-- Video Player Section -->
        <div class="flex-1 bg-black flex flex-col justify-center items-center relative group">
            <video id="video" class="w-full h-full max-h-screen object-contain" autoplay muted playsinline></video>
            
            <!-- Autoplay Overlay (If browser blocks muted autoplay audio) -->
            <div id="volume-notice" class="absolute top-4 left-4 bg-black/70 backdrop-blur-md text-xs text-yellow-400 px-3 py-1.5 rounded-md pointer-events-none hidden">
                <i class="fa-solid fa-volume-xmark mr-1"></i> ব্রাউজার সুরক্ষার কারণে সাউন্ড মিউট করা, আনমিউট করুন।
            </div>

            <!-- Custom Minimal Controls Overlay -->
            <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/90 via-black/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <!-- Prev Button -->
                    <button id="prev-btn" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition" title="আগের চ্যানেল">
                        <i class="fa-solid fa-backward"></i>
                    </button>
                    <!-- Play/Pause Button -->
                    <button id="play-btn" class="w-12 h-12 rounded-full bg-red-500 hover:bg-red-600 text-white flex items-center justify-center transition" title="প্লে/পজ">
                        <i class="fa-solid fa-pause text-lg"></i>
                    </button>
                    <!-- Next Button -->
                    <button id="next-btn" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition" title="পরের চ্যানেল">
                        <i class="fa-solid fa-forward"></i>
                    </button>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- Fullscreen Button -->
                    <button id="fullscreen-btn" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition">
                        <i class="fa-solid fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar Channel List (অনলাইন চ্যানেল হাইড থাকবে, বাটনে চাপ দিলে আসবে) -->
        <div id="channel-sidebar" class="absolute right-0 top-0 bottom-0 w-80 bg-[#111827] border-l border-gray-800 transform translate-x-full transition-transform duration-300 ease-in-out z-20 flex flex-col">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                <h2 class="font-semibold text-gray-200"><i class="fa-solid fa-list text-red-500 mr-2"></i>চ্যানেল সমূহ</h2>
                <button id="close-sidebar" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <!-- Search bar for channels -->
            <div class="p-3 border-b border-gray-800/50">
                <input type="text" id="search-input" placeholder="চ্যানেল খুঁজুন..." class="w-full bg-[#1f2937] border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-red-500">
            </div>
            <!-- Dynamic Channel Container -->
            <div id="channel-list-container" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                <div class="text-center py-8 text-gray-500 text-sm">চ্যানেল লোড হচ্ছে...</div>
            </div>
        </div>

    </div>

    <script>
        const PLAYLIST_URL = 'https://raw.githubusercontent.com/satubala/s/refs/heads/main/icf/playlist.m3u8';
        
        const video = document.getElementById('video');
        const channelListContainer = document.getElementById('channel-list-container');
        const sidebar = document.getElementById('channel-sidebar');
        const toggleListBtn = document.getElementById('toggle-list-btn');
        const closeSidebar = document.getElementById('close-sidebar');
        const currentChannelTitle = document.getElementById('current-channel-title');
        const searchInput = document.getElementById('search-input');
        const volumeNotice = document.getElementById('volume-notice');

        // Controls
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let channels = [];
        let currentIndex = 0;
        let hls = null;

        // Initialize App
        async function init() {
            setupEventListeners();
            await fetchAndParsePlaylist();
        }

        // Fetch and Parse M3U8
        async function fetchAndParsePlaylist() {
            try {
                const response = await fetch(PLAYLIST_URL);
                if (!response.ok) throw new Error('Network response error');
                const text = await response.text();
                
                channels = parseM3U(text);
                channels = prioritizeCricket(channels); // ক্রিকেট চ্যানেল আগে নিয়ে আসা

                if (channels.length > 0) {
                    renderChannels(channels);
                    playChannel(0);
                } else {
                    channelListContainer.innerHTML = `<div class="text-center py-8 text-red-400 text-sm">কোনো চ্যানেল পাওয়া যায়নি।</div>`;
                }
            } catch (error) {
                console.error(error);
                channelListContainer.innerHTML = `<div class="text-center py-8 text-red-400 text-sm">প্লেলিস্ট লোড করতে ব্যর্থ হয়েছে।</div>`;
            }
        }

        // Basic M3U Parser
        function parseM3U(data) {
            const lines = data.split('\n');
            const result = [];
            let currentItem = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    // Extract channel name
                    const nameParts = line.split(',');
                    const name = nameParts[nameParts.length - 1].trim();
                    
                    // Extract logo if exists
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const logo = logoMatch ? logoMatch[1] : '';

                    currentItem = { name, logo, url: '' };
                } else if (line && !line.startsWith('#')) {
                    if (currentItem) {
                        currentItem.url = line;
                        result.push(currentItem);
                        currentItem = null;
                    }
                }
            }
            return result;
        }

        // Prioritize Cricket/Sports Channels
        function prioritizeCricket(channelList) {
            const cricketKeywords = ['cricket', 't sports', 'tsports', 'gtv', 'gazi', 'sports', 'ক্রিকেট', 'খেলা', 'star sports', 'sony'];
            const cricketChannels = [];
            const otherChannels = [];

            channelList.forEach(channel => {
                const nameLower = channel.name.toLowerCase();
                const isCricket = cricketKeywords.some(keyword => nameLower.includes(keyword));
                if (isCricket) {
                    cricketChannels.push(channel);
                } else {
                    otherChannels.push(channel);
                }
            });

            return [...cricketChannels, ...otherChannels];
        }

        // Render Channel List in Sidebar
        function renderChannels(listToRender) {
            channelListContainer.innerHTML = '';
            listToRender.forEach((channel) => {
                // Find actual index from master list
                const actualIndex = channels.findIndex(c => c.url === channel.url);
                
                const item = document.createElement('button');
                item.className = `w-full text-left p-3 rounded-lg flex items-center space-x-3 transition group ${actualIndex === currentIndex ? 'bg-red-500/20 border border-red-500/40 text-white' : 'hover:bg-gray-800 text-gray-400 hover:text-gray-200'}`;
                item.onclick = () => {
                    playChannel(actualIndex);
                    // Mobile optimization: close sidebar on click
                    if (window.innerWidth < 768) toggleSidebar(false);
                };

                const iconWrapper = document.createElement('div');
                iconWrapper.className = `w-9 h-9 rounded-md bg-gray-800 flex items-center justify-center overflow-hidden shrink-0 group-hover:bg-gray-700 ${actualIndex === currentIndex ? 'bg-red-500/30' : ''}`;
                
                if (channel.logo) {
                    iconWrapper.innerHTML = `<img src="${channel.logo}" class="w-full h-full object-cover" onerror="this.innerHTML='<i class=\'fa-solid font-bold text-xs text-red-500\'>TV</i>'">`;
                } else {
                    iconWrapper.innerHTML = `<i class="fa-solid fa-circle-play ${actualIndex === currentIndex ? 'text-red-500' : 'text-gray-500'} text-sm"></i>`;
                }

                const nameSpan = document.createElement('span');
                nameSpan.className = 'text-sm font-medium truncate flex-1';
                nameSpan.textContent = channel.name;

                item.appendChild(iconWrapper);
                item.appendChild(nameSpan);
                channelListContainer.appendChild(item);
            });
        }

        // Play Channel Stream
        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            currentIndex = index;
            const channel = channels[currentIndex];

            currentChannelTitle.textContent = channel.name;
            updateActiveChannelUI();

            // Handle HLS Stream
            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls({
                    maxSubtitleBufferSize: 0
                });
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {
                        // Show notice if browser blocks auto-play audio
                        volumeNotice.classList.remove('hidden');
                    });
                });
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari
                video.src = channel.url;
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => {
                        volumeNotice.classList.remove('hidden');
                    });
                });
            }
        }

        // Update active class in list UI
        function updateActiveChannelUI() {
            const items = channelListContainer.querySelectorAll('button');
            // Re-render only if search is not active to avoid layout break
            if (!searchInput.value) {
                renderChannels(channels);
            }
        }

        // Toggle Sidebar Navigation
        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.remove('translate-x-full');
            } else {
                sidebar.classList.add('translate-x-full');
            }
        }

        // Event Listeners setup
        function setupEventListeners() {
            toggleListBtn.onclick = () => {
                const isHidden = sidebar.classList.contains('translate-x-full');
                toggleSidebar(isHidden);
            };
            closeSidebar.onclick = () => toggleSidebar(false);

            // Controls Events
            playBtn.onclick = () => {
                if (video.paused) {
                    video.play();
                    playBtn.innerHTML = '<i class="fa-solid fa-pause text-lg"></i>';
                } else {
                    video.pause();
                    playBtn.innerHTML = '<i class="fa-solid fa-play text-lg pl-0.5"></i>';
                }
            };

            video.onplay = () => playBtn.innerHTML = '<i class="fa-solid fa-pause text-lg"></i>';
            video.onpause = () => playBtn.innerHTML = '<i class="fa-solid fa-play text-lg pl-0.5"></i>';

            // Next / Prev Actions
            nextBtn.onclick = () => {
                let nextIdx = currentIndex + 1;
                if (nextIdx >= channels.length) nextIdx = 0;
                playChannel(nextIdx);
            };

            prevBtn.onclick = () => {
                let prevIdx = currentIndex - 1;
                if (prevIdx < 0) prevIdx = channels.length - 1;
                playChannel(prevIdx);
            };

            // Fullscreen Toggle
            fullscreenBtn.onclick = () => {
                if (!document.fullscreenElement) {
                    video.parentElement.requestFullscreen().catch(err => console.error(err));
                    fullscreenBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
                }
            };

            // Search logic
            searchInput.oninput = (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
                renderChannels(filtered);
            };

            // Clear volume notice on user interaction with video
            video.onclick = () => {
                if (video.muted) {
                    video.muted = false;
                    volumeNotice.classList.add('hidden');
                }
            };
        }

        // Start App on page load
        window.onload = init;
    </script>
</body>
</html>

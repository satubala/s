<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>for ICF Fans | Live Cricket & Sports</title>
    <link class="icon" type="image/svg+xml" href="/icon.svg"> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script> 
    
    <style>
        :root {
            /* --- Dark Premium Sports Mode --- */
            --bg-main: #070a13;
            --bg-gradient: radial-gradient(circle at top left, #0f172a, #070a13);
            --glass: rgba(15, 23, 42, 0.7);
            --glass-hover: rgba(30, 41, 59, 0.8);
            --glass-border: rgba(255, 255, 255, 0.06);
            --accent-cyan: #38bdf8;
            --accent-red: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --player-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        * { 
            box-sizing: border-box; 
            transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, transform 0.2s ease; 
        }

        /* Mobile Header */
        .mobile-logo-header {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 15px 10px 5px 10px;
            width: 100%;
        }

        .brand-text {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--accent-cyan), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        main { 
            padding: 8px;
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: flex-start;
        }

        .tv-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            width: 100%;
        }

        @media (min-width: 992px) {
            .tv-grid {
                grid-template-columns: 1fr 340px;
                height: calc(100vh - 120px);
                max-height: 720px;
            }
        }

        /* --- Video Player Styles --- */
        .player-wrapper {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: var(--player-shadow);
            position: relative;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .meta-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .live-tag {
            background: rgba(244, 63, 94, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(244, 63, 94, 0.3);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        .meta-container h1 {
            font-size: 1.15rem;
            margin: 0;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Sidebar Deck --- */
        .sidebar-deck {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            height: 100%;
            overflow: hidden;
        }

        .sidebar-logo {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-bottom: 4px;
            padding-left: 4px;
        }

        .search-box {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.15);
        }

        /* --- Channel List Container --- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            flex: 1;
            padding-right: 4px;
        }

        @media (max-width: 991px) {
            .list-container {
                max-height: 380px;
            }
        }

        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        /* --- Modern Channel Item Row --- */
        .ch-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            position: relative;
        }

        .ch-item:hover { 
            border-color: rgba(56, 189, 248, 0.4); 
            background: var(--glass-hover); 
            transform: translateX(2px); 
        }

        .ch-item.active {
            border-color: var(--accent-cyan);
            background: rgba(56, 189, 248, 0.08);
            box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.05);
        }

        .ch-num {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
            width: 20px;
        }

        .ch-item.active .ch-num {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .ch-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 2px;
        }

        .ch-title {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            padding-right: 35px;
        }

        /* --- Minimal Glowing Dot Badge --- */
        .status-badge {
            position: absolute;
            right: 14px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-checking { 
            background-color: var(--text-dim); 
            box-shadow: 0 0 8px var(--text-dim); 
        }
        
        .status-online { 
            background-color: #10b981; 
            box-shadow: 0 0 10px #10b981; 
            animation: pulse 1.5s infinite; 
        }
        
        .status-broken { 
            background-color: var(--accent-red); 
            box-shadow: 0 0 10px var(--accent-red); 
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        footer { 
            padding: 16px; 
            border-top: 1px solid var(--glass-border); 
            text-align: center; 
            font-size: 0.85rem;
            color: var(--text-dim);
            background: rgba(7, 10, 19, 0.9);
        }

        @media (max-width: 991px) {
            .mobile-logo-header {
                display: flex !important;
            }
            .sidebar-logo {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <header class="mobile-logo-header">
        <a href="/" class="brand-text">for ICF Fans</a>
    </header>

    <main>
        <div class="tv-grid">
            
            <div class="player-wrapper">
                <div class="video-container">
                    <video id="tv-screen" controls autoplay playsinline></video>
                </div>
                <div class="meta-container">
                    <span class="live-tag">LIVE</span>
                    <h1 id="stream-title">Verifying streams...</h1>
                </div>
            </div>

            <div class="sidebar-deck">
                <div class="sidebar-logo">
                    <a href="/" class="brand-text">for ICF Fans</a>
                </div>
                
                <input type="text" id="filterInput" class="search-box" placeholder="Search cricket & sports channels...">
                
                <div class="list-container" id="deckContainer">
                    <div style="text-align:center; color:var(--text-dim); padding:40px; font-size: 0.9rem;">Processing Indian sports channels...</div>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div>&copy; 2026 <b>for ICF Fans</b> | Dedicated for Cricket Lovers. All Rights Reserved.</div>
    </footer>

    <script>
        const tvScreen = document.getElementById('tv-screen');
        const deckContainer = document.getElementById('deckContainer');
        const streamTitle = document.getElementById('stream-title');
        const filterInput = document.getElementById('filterInput');

        let coreRegistry = [];
        let activeHls = null;

        const defaultLogo = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M21 6H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 14H3V8h18v12zM8.5 17l6-5-6-5v10z'/></svg>`;

        async function syncServerPlaylist() {
            try {
                // Swapped configuration to target the direct India ecosystem stream index
                const response = await fetch(`https://raw.githubusercontent.com/iptv-org/iptv/refs/heads/master/streams/in.m3u?t=${Date.now()}`);
                if (!response.ok) throw new Error('Offline');
                const rawData = await response.text();
                compileM3URegistry(rawData);
            } catch (err) {
                streamTitle.textContent = "Indian streams unavailable";
                deckContainer.innerHTML = `<div style="text-align:center; padding:30px; color:var(--accent-red); font-size:0.9rem;">Unable to load streaming source.</div>`;
            }
        }

        // Dedicated strict validation to completely drop non-sports entries from the broader country playlist
        function isStrictSportsChannel(name, details) {
            const lowerName = name.toLowerCase();
            const lowerDetails = details.toLowerCase();

            // Match structural category tags 
            if (lowerDetails.includes('group-title="sports"') || lowerDetails.includes('category="sports"')) {
                return true;
            }

            // High-confidence sports & cricket network keywords
            const sportsKeywords = [
                'sports', 'cricket', 'willow', 'sony ten', 'star sports', 'sports18', 
                'dd sports', 'fancode', 'ten sports', 'prime sports', 'eurosport', 
                'neo prime', 'neo sports', 'wwe', 'ufc', 'racing', 't20', 'ipl', 'icc'
            ];

            return sportsKeywords.some(keyword => lowerName.includes(keyword));
        }

        function compileM3URegistry(text) {
            const architecturalLines = text.split('\n');
            coreRegistry = [];
            let currentName = '';
            let currentLogo = '';
            let rawExtInf = '';

            for (let i = 0; i < architecturalLines.length; i++) {
                const cleanLine = architecturalLines[i].trim();
                
                if (cleanLine.startsWith('#EXTINF:')) {
                    rawExtInf = cleanLine;
                    const logoMatch = cleanLine.match(/(?:tvg-logo|logo)=["']([^"']+)["']/i);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                    const commaIndex = cleanLine.lastIndexOf(',');
                    currentName = commaIndex !== -1 ? cleanLine.substring(commaIndex + 1).trim() : 'Unnamed Channel';
                } else if (cleanLine !== '' && !cleanLine.startsWith('#')) {
                    if (currentName) {
                        // Strict isolation: only store item if it explicitly belongs to the sports framework
                        if (isStrictSportsChannel(currentName, rawExtInf)) {
                            coreRegistry.push({
                                name: currentName,
                                url: cleanLine,
                                logo: currentLogo,
                                rawExtInf: rawExtInf
                            });
                        }
                    }
                    currentName = '';
                    currentLogo = '';
                    rawExtInf = '';
                }
            }

            if (coreRegistry.length > 0) {
                // Sorting array matrix prioritizing prime live cricket configurations
                coreRegistry.sort((a, b) => {
                    const scoreA = calculatePriorityScore(a);
                    const scoreB = calculatePriorityScore(b);
                    return scoreB - scoreA; 
                });

                buildInterfaceRows(coreRegistry);
                autoCheckLinksHealth();
            } else {
                streamTitle.textContent = "No Sports Channels Found";
                deckContainer.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-dim); font-size:0.9rem;">No active sports channels matches discovered in source file.</div>`;
            }
        }

        function calculatePriorityScore(item) {
            const name = item.name.toLowerCase();
            let score = 0;

            // Tier 1 Match: Live Cricket Direct Targets
            if (name.includes('cricket') || name.includes('willow') || name.includes('icc') || name.includes('ipl') || name.includes('t20')) {
                score += 50;
            }

            // Tier 2 Match: Major Indian Broadcaster Networks
            if (name.includes('star sports') || name.includes('sony ten') || name.includes('sony sports') || name.includes('sports18') || name.includes('dd sports') || name.includes('fancode') || name.includes('ten sports')) {
                score += 30;
            }

            // Tier 3 Match: Standard sports markers
            if (name.includes('sports')) {
                score += 10;
            }

            return score;
        }

        function buildInterfaceRows(items) {
            deckContainer.innerHTML = '';
            items.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'ch-item';
                row.setAttribute('data-target', item.name.toLowerCase());
                
                const logoSrc = item.logo ? item.logo : defaultLogo;
                const paddedIndex = String(index + 1).padStart(2, '0');

                row.innerHTML = `
                    <span class="ch-num">${paddedIndex}</span>
                    <img class="ch-img" src="${logoSrc}" alt="" onerror="this.src='${defaultLogo}'">
                    <span class="ch-title">${item.name}</span>
                    <span class="status-badge status-checking" id="status-${index}"></span>
                `;

                row.addEventListener('click', () => {
                    document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
                    row.classList.add('active');
                    mountLivePlayback(item.url, item.name);
                });

                deckContainer.appendChild(row);
            });
        }

        // Sequential validation loops
        async function autoCheckLinksHealth() {
            let initialPlayMounted = false;

            for (let i = 0; i < coreRegistry.length; i++) {
                const targetChannel = coreRegistry[i];
                const badgeElement = document.getElementById(`status-${i}`);
                if (!badgeElement) continue;
                const rowElement = badgeElement.closest('.ch-item');

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 4000); 

                    const response = await fetch(targetChannel.url, { 
                        method: 'GET', 
                        signal: controller.signal 
                    });

                    clearTimeout(timeoutId);
                    
                    if (response.ok) {
                        badgeElement.className = "status-badge status-online";
                        
                        // Instantly fire player with the highest ranked live channel discovered
                        if (!initialPlayMounted) {
                            mountLivePlayback(targetChannel.url, targetChannel.name);
                            document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
                            if (rowElement) rowElement.classList.add('active');
                            initialPlayMounted = true;
                        }
                    } else {
                        throw new Error('Not streamable');
                    }

                } catch (networkError) {
                    badgeElement.className = "status-badge status-broken";
                    if (rowElement) {
                        rowElement.classList.add('is-broken');
                        rowElement.style.display = 'none';
                    }
                }
            }

            // Ultimate fallback safety loop
            if (!initialPlayMounted && coreRegistry.length > 0) {
                mountLivePlayback(coreRegistry[0].url, coreRegistry[0].name);
                const firstRow = document.querySelector('.ch-item');
                if (firstRow) firstRow.classList.add('active');
            }
        }

        function mountLivePlayback(url, name) {
            streamTitle.textContent = name;
            if (activeHls) activeHls.destroy();

            const currentIndex = coreRegistry.findIndex(item => item.url === url);

            function markCurrentAsBroken() {
                streamTitle.textContent = `⚠️ Offline: ${name}`;
                if (currentIndex !== -1) {
                    const badgeElement = document.getElementById(`status-${currentIndex}`);
                    if (badgeElement) {
                        badgeElement.className = "status-badge status-broken";
                        const rowElement = badgeElement.closest('.ch-item');
                        if (rowElement) {
                            rowElement.classList.add('is-broken');
                            rowElement.style.display = 'none';
                        }
                    }
                }
            }

            if (Hls.isSupported()) {
                activeHls = new Hls();
                activeHls.loadSource(url);
                activeHls.attachMedia(tvScreen);
                activeHls.on(Hls.Events.MANIFEST_PARSED, () => tvScreen.play());
                activeHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        markCurrentAsBroken();
                    }
                });
            } else if (tvScreen.canPlayType('application/vnd.apple.mpegurl')) {
                tvScreen.src = url;
                
                const nativeErrorHandler = () => {
                    markCurrentAsBroken();
                    tvScreen.removeEventListener('error', nativeErrorHandler);
                };
                
                tvScreen.addEventListener('error', nativeErrorHandler);
                tvScreen.addEventListener('loadedmetadata', () => {
                    tvScreen.play();
                    tvScreen.removeEventListener('error', nativeErrorHandler);
                });
            }
        }

        filterInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.ch-item').forEach(row => {
                if (row.classList.contains('is-broken')) {
                    row.style.display = "none";
                    return;
                }
                const title = row.getAttribute('data-target');
                row.style.display = title.includes(query) ? "flex" : "none";
            });
        });

        lucide.createIcons();
        syncServerPlaylist();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Image Studio</title>
    <style>
        :root {
            --bg: #ffffff; --card: #f9fafb; --text: #111827;
            --border: #e5e7eb; --primary: #2563eb; --input: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
                --border: #334155; --input: #334155;
            }
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; display: flex; justify-content: center; padding: 20px;
        }

        .app-container {
            width: 100%; max-width: 600px;
            background: var(--card); border-radius: 20px;
            padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Drag & Drop Zone */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px; padding: 40px 20px;
            text-align: center; cursor: pointer;
            transition: 0.3s; margin-bottom: 20px;
        }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(37, 99, 235, 0.1); }

        .settings-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;
        }

        .full-width { grid-column: span 2; }

        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 13px; font-weight: 600; opacity: 0.8; }
        
        input, select {
            padding: 12px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--input); color: var(--text); font-size: 16px;
        }

        input[type="range"] { padding: 0; cursor: pointer; }

        button {
            width: 100%; padding: 16px; border-radius: 12px;
            background: var(--primary); color: white; border: none;
            font-weight: 700; cursor: pointer; font-size: 16px;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.4; }

        #preview-wrap {
            margin-top: 20px; border-radius: 12px; overflow: hidden;
            background: #000; display: none; position: relative;
        }
        img { max-width: 100%; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="margin-top:0">Image Studio</h2>

    <div class="drop-zone" id="dropZone">
        <p id="dropText">Drag & drop image or click to upload</p>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>

    <div class="settings-grid">
        <div class="field">
            <label>Width (px)</label>
            <input type="number" id="wInput">
        </div>
        <div class="field">
            <label>Height (px)</label>
            <input type="number" id="hInput">
        </div>
        <div class="field">
            <label>Format</label>
            <select id="format">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPEG</option>
                <option value="image/webp">WebP</option>
            </select>
        </div>
        <div class="field">
            <label>Quality (<span id="qVal">90</span>%)</label>
            <input type="range" id="quality" min="1" max="100" value="90">
        </div>
    </div>

    <button id="saveBtn" disabled>Process & Download</button>

    <div id="preview-wrap">
        <img id="previewImg">
    </div>

    <canvas id="canvas" style="display:none"></canvas>
</div>

<script>
    const $ = id => document.getElementById(id);
    let originalImg = new Image();
    let ratio = 1;

    // Handle Uploads
    const handleFile = file => {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = e => originalImg.src = e.target.result;
        reader.readAsDataURL(file);
        $('dropText').innerText = file.name;
    };

    $('dropZone').onclick = () => $('fileInput').click();
    $('fileInput').onchange = e => handleFile(e.target.files[0]);

    // Drag & Drop
    $('dropZone').ondragover = e => { e.preventDefault(); $('dropZone').classList.add('dragover'); };
    $('dropZone').ondragleave = () => $('dropZone').classList.remove('dragover');
    $('dropZone').ondrop = e => {
        e.preventDefault();
        $('dropZone').classList.remove('dragover');
        handleFile(e.dataTransfer.files[0]);
    };

    originalImg.onload = () => {
        ratio = originalImg.width / originalImg.height;
        $('wInput').value = originalImg.width;
        $('hInput').value = originalImg.height;
        $('previewImg').src = originalImg.src;
        $('preview-wrap').style.display = 'block';
        $('saveBtn').disabled = false;
    };

    // Aspect Ratio Logic
    $('wInput').oninput = () => $('hInput').value = Math.round($('wInput').value / ratio);
    $('hInput').oninput = () => $('wInput').value = Math.round($('hInput').value * ratio);
    $('quality').oninput = e => $('qVal').innerText = e.target.value;

    // Processing
    $('saveBtn').onclick = () => {
        const canvas = $('canvas');
        const ctx = canvas.getContext('2d');
        const w = parseInt($('wInput').value);
        const h = parseInt($('hInput').value);
        
        canvas.width = w;
        canvas.height = h;
        
        // Quality & Smoothing
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        ctx.drawImage(originalImg, 0, 0, w, h);

        const format = $('format').value;
        const quality = $('quality').value / 100;
        
        const link = document.createElement('a');
        link.download = `resized-${Date.now()}.${format.split('/')[1]}`;
        link.href = canvas.toDataURL(format, quality);
        link.click();
    };
</script>

</body>
</html>

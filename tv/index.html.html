<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>satu.pro.bd | Live TV</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg"> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script> 
    
    <style>
        :root {
            /* --- Light Mode --- */
            --bg-main: #f1f5f9;
            --bg-gradient: radial-gradient(circle at top right, #e2e8f0, #f1f5f9);
            --glass: rgba(255, 255, 255, 0.7);
            --glass-hover: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(0, 0, 0, 0.1);
            --accent-cyan: #0891b2;
            --accent-gold: #b45309;
            --accent-red: #e11d48;
            --text-main: #0f172a;
            --text-dim: #475569;
            --header-bg: rgba(255, 255, 255, 0.85);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* --- Dark Mode --- */
                --bg-main: #0a0f1d;
                --bg-gradient: radial-gradient(circle at top right, #1e293b, #0a0f1d);
                --glass: rgba(30, 41, 59, 0.7);
                --glass-hover: rgba(51, 65, 85, 0.9);
                --glass-border: rgba(255, 255, 255, 0.1);
                --accent-cyan: #22d3ee;
                --accent-gold: #fbbf24;
                --accent-red: #f43f5e;
                --text-main: #f1f5f9;
                --text-dim: #94a3b8;
                --header-bg: rgba(10, 15, 29, 0.85);
            }
        }

        html, body {
            overflow-x: hidden;
            width: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
        }

        * { 
            box-sizing: border-box; 
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        body {
            color: var(--text-main);
            font-family: 'SolaimanLipi', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4));
        }

        main { 
            flex: 1; 
            padding: 25px 15px;
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .tv-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 992px) {
            .tv-grid {
                grid-template-columns: 1fr 360px;
            }
        }

        .player-wrapper {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            height: fit-content;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .meta-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }

        .live-tag {
            background: rgba(225, 29, 72, 0.15);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .meta-container h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 700;
        }

        .sidebar-deck {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-box {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            max-height: calc(100vh - 230px);
            padding-right: 4px;
        }

        .list-container::-webkit-scrollbar { width: 5px; }
        .list-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .ch-item {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            position: relative;
        }

        .ch-item:hover { 
            border-color: var(--accent-cyan); 
            background: var(--glass-hover); 
            transform: translateX(4px); 
        }

        .ch-item.active {
            border-color: var(--accent-cyan);
            background: var(--glass-hover);
        }

        .ch-num {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .ch-img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 2px;
        }

        .ch-title {
            font-size: 1.05rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
            padding-right: 45px; /* Status badge-er jonno jaiga faka rakha */
        }

        /* --- Status Badge Styling --- */
        .status-badge {
            font-size: 0.75rem;
            font-weight: 700;
            position: absolute;
            right: 16px;
            padding: 2px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .status-checking { color: var(--text-dim); background: rgba(0,0,0,0.05); }
        .status-online { color: #22c55e; background: rgba(34, 197, 94, 0.1); }
        .status-broken { color: var(--accent-red); background: rgba(225, 29, 72, 0.1); }

        /* Active Channel Status Overlay (Pulsing Dot) */
        .ch-item.active .status-badge::after {
            content: '';
            width: 6px;
            height: 6px;
            background-color: currentColor;
            border-radius: 50%;
            display: inline-block;
            margin-left: 4px;
            animation: live-pulse 1.6s infinite ease-in-out;
        }

        @keyframes live-pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        footer { 
            background: var(--header-bg); 
            padding: 24px; 
            border-top: 1px solid var(--glass-border); 
            text-align: center; 
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="/">
            <img src="/logo.svg" alt="satu.pro.bd" class="header-img">
        </a>
    </header>

    <main>
        <div class="tv-grid">
            
            <div class="player-wrapper">
                <div class="video-container">
                    <video id="tv-screen" controls autoplay playsinline></video>
                </div>
                <div class="meta-container">
                    <span class="live-tag">LIVE</span>
                    <h1 id="stream-title">চ্যানেল লোড করা হচ্ছে...</h1>
                </div>
            </div>

            <div class="sidebar-deck">
                <input type="text" id="filterInput" class="search-box" placeholder="চ্যানেল খুঁজুন...">
                <div class="list-container" id="deckContainer">
                    <div style="text-align:center; color:var(--text-dim); padding:40px;">লিস্ট প্রসেস হচ্ছে...</div>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <div>&copy; 2026 <b>SATU</b> | All Rights Reserved.</div>
    </footer>

    <script>
        const tvScreen = document.getElementById('tv-screen');
        const deckContainer = document.getElementById('deckContainer');
        const streamTitle = document.getElementById('stream-title');
        const filterInput = document.getElementById('filterInput');

        let coreRegistry = [];
        let activeHls = null;

        const defaultLogo = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23475569'><path d='M21 6H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 14H3V8h18v12zM8.5 17l6-5-6-5v10z'/></svg>`;

        async function syncServerPlaylist() {
            try {
                const response = await fetch(`/playlist.m3u?t=${Date.now()}`);
                if (!response.ok) throw new Error('File offline');
                const rawData = await response.text();
                compileM3URegistry(rawData);
            } catch (err) {
                streamTitle.textContent = "প্লে-লিস্ট ফাইল পাওয়া যায়নি";
                deckContainer.innerHTML = `<div style="text-align:center; padding:30px; color:var(--accent-red);">রুট ডিরেক্টরিতে playlist.m3u ফাইলটি অনুপস্থিত।</div>`;
            }
        }

        function compileM3URegistry(text) {
            const architecturalLines = text.split('\n');
            coreRegistry = [];
            let currentName = '';
            let currentLogo = '';

            for (let i = 0; i < architecturalLines.length; i++) {
                const cleanLine = architecturalLines[i].trim();
                
                if (cleanLine.startsWith('#EXTINF:')) {
                    const logoMatch = cleanLine.match(/(?:tvg-logo|logo)=["']([^"']+)["']/i);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                    const commaIndex = cleanLine.lastIndexOf(',');
                    currentName = commaIndex !== -1 ? cleanLine.substring(commaIndex + 1).trim() : 'Unnamed Channel';
                } else if (cleanLine !== '' && !cleanLine.startsWith('#')) {
                    coreRegistry.push({
                        name: currentName || `চ্যানেল ${coreRegistry.length + 1}`,
                        url: cleanLine,
                        logo: currentLogo
                    });
                    currentName = '';
                    currentLogo = '';
                }
            }

            if (coreRegistry.length > 0) {
                buildInterfaceRows(coreRegistry);
                mountLivePlayback(coreRegistry[0].url, coreRegistry[0].name);
                document.querySelector('.ch-item').classList.add('active');
                
                // Playlist render hobar por background link testing shuru hobe
                autoCheckLinksHealth();
            } else {
                streamTitle.textContent = "প্লে-লিস্ট খালি";
                deckContainer.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-dim);">কোনো ডেটা পাওয়া যায়নি।</div>`;
            }
        }

        function buildInterfaceRows(items) {
            deckContainer.innerHTML = '';
            items.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'ch-item';
                row.setAttribute('data-target', item.name.toLowerCase());
                
                const logoSrc = item.logo ? item.logo : defaultLogo;
                const paddedIndex = String(index + 1).padStart(2, '0');

                row.innerHTML = `
                    <span class="ch-num">${paddedIndex}</span>
                    <img class="ch-img" src="${logoSrc}" alt="" onerror="this.src='${defaultLogo}'">
                    <span class="ch-title">${item.name}</span>
                    <span class="status-badge status-checking" id="status-${index}">⏳...</span>
                `;

                row.addEventListener('click', () => {
                    document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
                    row.classList.add('active');
                    mountLivePlayback(item.url, item.name);
                });

                deckContainer.appendChild(row);
            });
        }

        // --- Asynchronous Background Link Checker Logic ---
        async function autoCheckLinksHealth() {
            for (let i = 0; i < coreRegistry.length; i++) {
                const targetChannel = coreRegistry[i];
                const badgeElement = document.getElementById(`status-${i}`);
                
                if (!badgeElement) continue;

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 6000); // 6 second dead-line

                    // 'no-cors' request pathiye network level connection status check kora hosche
                    const checkResponse = await fetch(targetChannel.url, { 
                        method: 'GET', 
                        mode: 'no-cors',
                        signal: controller.signal 
                    });

                    clearTimeout(timeoutId);

                    // Connection successfully respond korle sachal dhore neya hobe
                    badgeElement.textContent = "🟢 Satchal";
                    badgeElement.className = "status-badge status-online";

                } catch (networkError) {
                    // Timeout ba network host unresolved hole link broken mark hobe
                    badgeElement.textContent = "🔴 Broken";
                    badgeElement.className = "status-badge status-broken";
                }
            }
        }

        function mountLivePlayback(url, name) {
            streamTitle.textContent = name;
            if (activeHls) activeHls.destroy();

            if (Hls.isSupported()) {
                activeHls = new Hls();
                activeHls.loadSource(url);
                activeHls.attachMedia(tvScreen);
                activeHls.on(Hls.Events.MANIFEST_PARSED, () => tvScreen.play());
                activeHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) streamTitle.textContent = `⚠️ অফলাইন: ${name}`;
                });
            } else if (tvScreen.canPlayType('application/vnd.apple.mpegurl')) {
                tvScreen.src = url;
                tvScreen.addEventListener('loadedmetadata', () => tvScreen.play());
            }
        }

        filterInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.ch-item').forEach(row => {
                const title = row.getAttribute('data-target');
                row.style.display = title.includes(query) ? "flex" : "none";
            });
        });

        lucide.createIcons();
        syncServerPlaylist();
    </script>
</body>
</html>
